name: internlink
description: OJT Monitoring System Mobile App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  
  # API & Networking
  dio: ^5.3.0
  retrofit: ^4.0.0
  retrofit_generator: ^7.0.0
  json_annotation: ^4.8.0
  json_serializable: ^6.7.0
  
  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # UI & Navigation
  go_router: ^10.0.0
  flutter_screenutil: ^5.8.0
  
  # Camera & Image
  image_picker: ^1.0.0
  camera: ^0.10.0
  local_auth: ^2.1.0
  
  # Location
  geolocator: ^9.0.2
  
  # Charts
  fl_chart: ^0.63.0
  
  # PDF & Export
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # Signature
  signature: ^5.3.0
  
  # Notifications
  flutter_local_notifications: ^15.0.0
  
  # Utilities
  logger: ^2.0.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0
  device_info_plus: ^9.0.0
  
  # Date/Time
  intl: ^0.18.1
  table_calendar: ^3.0.9
  
  # Animation
  lottie: ^2.6.0
  
  # QR Code (optional)
  qr_code_scanner: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
